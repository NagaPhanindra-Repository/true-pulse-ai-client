<header class="main-header">
  <div class="header-content">
    <a class="brand" routerLink="/">
      <img src="assets/test.svg" alt="ezit.ai logo" class="brand-logo" />
    </a>
    <!-- Navigation links, only for logged in users -->
    <nav class="nav-links" [class.mobile-open]="showMobileNav" *ngIf="isLoggedIn">
      <a routerLink="/dashboard" (click)="closeMobileNav()" class="nav-link nav-home">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-right: 4px;">
          <path d="M2 14h2v-4h8v4h2v-7l-7-5-7 5v7z" fill="currentColor" stroke="currentColor" stroke-width="0.5"/>
        </svg>
        Home
      </a>
      <!-- <a routerLink="/memories" (click)="closeMobileNav()" class="nav-link nav-memory">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-right: 4px;">
          <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="8" cy="8" r="2" fill="currentColor"/>
        </svg>
        Memory
      </a> -->
      <a routerLink="/retros" (click)="closeMobileNav()" class="nav-link nav-retros">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-right: 4px;">
          <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 6h6M5 10h4" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        </svg>
        Retros
      </a>
      <a routerLink="/questions" (click)="closeMobileNav()" class="nav-link nav-questions">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-right: 4px;">
          <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/>
          <text x="8" y="10.5" text-anchor="middle" font-size="10" font-weight="bold" fill="currentColor">?</text>
        </svg>
        Questions
      </a>
      <a routerLink="/followers" (click)="closeMobileNav()" class="nav-link nav-followers">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-right: 4px;">
          <circle cx="5" cy="4.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M1 14c0-2 1.5-3 4-3s4 1 4 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="11" cy="4.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7.5 14c0-1.5 1-2.25 2.5-2.25s2.5.75 2.5 2.25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Followers
      </a>
      <a routerLink="/business" (click)="closeMobileNav()" class="nav-link nav-business">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-right: 4px;">
          <rect x="2" y="5" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 5v-2a1 1 0 011-1h4a1 1 0 011 1v2M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Business
      </a>
      <a routerLink="/entities/create" (click)="closeMobileNav()" class="nav-link nav-create">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-right: 4px;">
          <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Create Entity
      </a>
      <a routerLink="/entities/my" (click)="closeMobileNav()" class="nav-link nav-entities">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-right: 4px;">
          <rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        My Entities
      </a>
    </nav>
    <div class="header-actions">
      <ng-container *ngIf="!isLoggedIn; else loggedInBlock">
        <button class="login-btn" (click)="showLogin = true">Login</button>
        <button class="signup-btn" (click)="showSignUp = true">Sign Up</button>
      </ng-container>
      <ng-template #loggedInBlock>
        <button class="hamburger" (click)="toggleMobileNav()" aria-label="Open navigation">
          <span></span><span></span><span></span>
        </button>
        <div class="profile-menu-wrapper"
             (mouseenter)="toggleProfileDropdown(true)"
             (mouseleave)="toggleProfileDropdown(false)"
             (click)="toggleProfileClick()">
          <!-- Profile Picture or Initials Avatar -->
          <div class="profile-pic-wrapper">
            <img *ngIf="!showInitialsAvatar" 
                 [src]="profilePic" 
                 alt="Profile" 
                 class="profile-pic" 
                 (error)="onProfilePicError()" />
            <div *ngIf="showInitialsAvatar" 
                 class="profile-initials" 
                 [style.background]="avatarColor">
              {{ userInitials }}
            </div>
          </div>
          <span class="profile-label">
            <ng-container *ngIf="userName; else profileText">{{ userName }}</ng-container>
            <ng-template #profileText>Profile</ng-template>
          </span>
          <div class="profile-dropdown glassy-card" 
               *ngIf="showProfileDropdown"
               (mouseenter)="toggleProfileDropdown(true)"
               (mouseleave)="toggleProfileDropdown(false)"
               (click)="$event.stopPropagation()">
            <a href="#" (click)="closeProfileDropdown(); $event.preventDefault()">My Profile</a>
            <a href="#" (click)="closeProfileDropdown(); $event.preventDefault()">Settings</a>
            <a href="#" (click)="logout(); $event.preventDefault()">Logout</a>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
  <div class="signup-modal" *ngIf="showSignUp">
    <div class="signup-modal-backdrop" (click)="showSignUp = false"></div>
    <div class="signup-modal-content">
      <button class="signup-modal-close" (click)="showSignUp = false">×</button>
      <app-sign-up (signupSuccess)="showSignUp = false; showLogin = true; loginSuccessMessage = $event"></app-sign-up>
    </div>
  </div>
  <div class="signup-modal" *ngIf="showLogin">
    <div class="signup-modal-backdrop" (click)="showLogin = false; loginSuccessMessage = null"></div>
    <div class="signup-modal-content">
      <button class="signup-modal-close" (click)="showLogin = false; loginSuccessMessage = null">×</button>
      <app-login-in [successMessage]="loginSuccessMessage" (closeLogin)="showLogin = false; loginSuccessMessage = null"></app-login-in>
    </div>
  </div>
</header>
