<div class="website-chatbot-widget">
  <div class="chat-header">
    <mat-icon>{{ icon }}</mat-icon>
    <span class="chat-title">{{ entityName }}</span>
  </div>
  <div class="chat-body">
    <div *ngFor="let msg of chatMessages" class="chat-message" [class.user]="msg.role === 'user'" [class.bot]="msg.role === 'assistant'">
      {{ msg.text }}
    </div>
    <div class="chat-message bot ai-typing" *ngIf="aiThinking">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
    <div class="chat-message bot ai-typing-text" *ngIf="aiTyping">
      {{ revealText }}<span class="cursor">|</span>
    </div>
  </div>
  <form class="chat-input-row" (ngSubmit)="sendMessage()">
    <input
      type="text"
      [(ngModel)]="userInput"
      name="userInput"
      placeholder="Ask a question..."
      (keydown)="onEnterSend($event)"
      [disabled]="aiThinking || aiTyping" />
    <button class="send-btn" type="submit" [disabled]="!userInput.trim() || aiThinking || aiTyping">
      <mat-icon>send</mat-icon>
    </button>
  </form>
</div>
